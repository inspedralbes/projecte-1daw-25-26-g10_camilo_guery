<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulari d'Incidències</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>

    <nav class="navbar border-bottom border-secondary-subtle mb-5 p-3">
        <div class="container-fluid justify-content-center">
           <h4 class="mb-0 text-dark fw-dark text-uppercase tracking-wide">Formulari d'Incidències</h4>
        </div>
    </nav>

    <div class="container px-md-5 pb-5">
        <div class="row g-5"> 
            <div class="col-lg-6">
                <h6 class="text-secondary text-uppercase mb-4">Registrar Incidència</h6>

                <div class="card p-4 mb-4">
                    <form>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6"><input type="text" name="departament" class="form-control" placeholder="Departament" required></div>
                            <div class="col-md-6"><input type="date" name="data" class="form-control" placeholder="Data"></div>
                            <div class="col-md-6"><input type="text" name="incidencia" class="form-control" placeholder="Incidència" required></div>
                        </div>
                        <button type="submit" class="btn btn-light w-100">Registrar Incidència</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-6">
                <h6 class="text-secondary text-uppercase mb-4">Consultar Incidència</h6>

                <div class="card p-4">
                    <form>
                        <div class="input-group">
                            <input type="number" name="id_incidencia" class="form-control" placeholder="ID" required>
                            <button type="submit" class="btn btn-outline-dark">Consultar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
